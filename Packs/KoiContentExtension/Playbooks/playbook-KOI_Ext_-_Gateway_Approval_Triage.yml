      version: -1
      name: Clear previous XQL results
      description: xdr-xql-generic-query APPENDS to PaloAltoNetworksXQL.GenericQuery. Deleting it first guarantees the decision-history read below sees only its own result.
      iscommand: false
      brand: ""
      script: DeleteContext
      type: regular
    scriptarguments:
      key:
        simple: PaloAltoNetworksXQL.GenericQuery
    nexttasks:
      '#none#':
      - "6"
    separatecontext: false
    continueonerror: true
    continueonerrortype: ""
    view: '{"position": {"x": 450, "y": 680}}'
    note: false
    timertriggers: []
