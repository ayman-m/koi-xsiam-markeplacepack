    type: regular
    task:
      id: koiextgw-0000-4000-8000-000000000004
      version: -1
      name: Record - not installed (block held)
      description: The expected branch. The requested item is absent from inventory, which is what a working block looks like. Recorded explicitly so the reviewer sees an asserted negative rather than a missing value.
      iscommand: false
      brand: ""
      script: Set
      type: regular
    scriptarguments:
      key:
        simple: KoiApproval.presence
      value:
