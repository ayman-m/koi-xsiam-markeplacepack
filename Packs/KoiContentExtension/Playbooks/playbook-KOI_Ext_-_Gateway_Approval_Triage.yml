  "6":
    id: "6"
    taskid: koiextgw-0000-4000-8000-000000000006
    type: regular
    task:
      id: koiextgw-0000-4000-8000-000000000006
      version: -1
      name: Decision history for this item (XQL)
      description: 'THE STRONGEST DECISION INPUT. Rebuilds every prior approval request for this item name: how many times, by how many distinct people, and whether a reviewer already rejected it. Mirrors docs/xql/G1.xql and G2.xql. Extraction is INLINE because the parsing rule''s koi_approval_* columns apply at ingest only and are null on historical rows. OPTIONAL dependency - xdr-xql-generic-query is the Cortex XDR - XQL Query Engine (Core on the Cortex platform), NOT a KOI command; the whole task is continue-on-error and the playbook completes without it.'
      iscommand: true
      brand: ""
      script: '|||xdr-xql-generic-query'
      type: regular
    scriptarguments:
      query:
        simple: |-
          dataset = koi_koi_raw
          | filter type = "approval_requests" and object_name = "${inputs.item_name}"
          | alter decision = if(message contains "was rejected by", "rejected",
                                message contains "was approved by", "approved",
                                message contains "submitted by",    "submitted", to_string(null)),
                  requester = coalesce(
                      arrayindex(regextract(message, "submitted by\s+(\S+)"), 0),
                      arrayindex(regextract(message, "by\s+(\S+)\s+was\s+(?:rejected|approved)"), 0))
          | comp count() as requests,
                 count_distinct(requester) as distinct_requesters,
                 sum(if(decision = "rejected", 1, 0)) as prior_rejections,
                 sum(if(decision = "approved", 1, 0)) as prior_approvals,
                 min(_time) as first_request, max(_time) as last_request
            by object_name, marketplace
      time_frame:
        simple: ${inputs.lookback_days} days
      using:
        simple: ${inputs.xql_instance}
    nexttasks:
      '#error#':
      - "7"
      '#none#':
      - "7"
    separatecontext: false
    continueonerror: true
    continueonerrortype: errorPath
    view: '{"position": {"x": 450, "y": 840}}'
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
