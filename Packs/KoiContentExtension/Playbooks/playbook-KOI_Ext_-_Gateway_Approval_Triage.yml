id: KOI Ext - Gateway Approval Triage
version: -1
fromversion: 6.10.0
name: KOI Ext - Gateway Approval Triage
description: |-
  Triages a KOI Supply Chain Gateway APPROVAL REQUEST - the exception a user files after the
  gateway blocked their install - and produces an evidence-backed recommendation for a human
  reviewer. It never approves anything itself.

  PACK: KOI Content Extension. Extends the Marketplace KOI pack v1.2.3 (13 commands,
  integration only). Uses only commands that pack ships, plus the OPTIONAL
  xdr-xql-generic-query (Cortex XDR - XQL Query Engine / Core) for decision history.

  ============================================================================
  WHY THIS PLAYBOOK EXISTS, AND WHY IT IS NOT AN "ENRICH THE ITEM" PLAYBOOK
  ============================================================================
  The gateway's own Allowed/Blocked verdict log is CONSOLE-ONLY and never reaches XSIAM
  (verified 2026-07-23 on tenant paet: koi_koi_raw carries 17 distinct (type, action) pairs,
  none of them a gateway/block/network type, and `_raw_log contains "Blocked"` returns 0 rows).
  You cannot trigger on a block. What you CAN trigger on is the user's reaction to it: the
  block page offers a "Request access" button, and pressing it emits an `approval_requests`
  audit row. That row is this playbook's input.

  🚨 THE BLOCKED ITEM IS NOT IN INVENTORY, AND THAT IS NOT A BUG.
  The obvious design - "enrich the requested item" - DOES NOT WORK, and the reason is
  structural rather than incidental. An approval request exists precisely BECAUSE the item was
  blocked; blocked means never installed; never installed means it never entered the
  organization's inventory. Live proof, 2026-07-23: `item_display_name=Snake` returns
  total_count 0 on every marketplace, while the control query returns 65 chrome_web_store
  items - the filter works, the item genuinely is not there.
  CONSEQUENCE: koi-inventory-item-get and koi-inventory-item-endpoints-list are USELESS here
  (both also require a version this event does not carry), and the pack's own
  "KOI Ext - Enrich Item" sub-playbook is NOT reused, deliberately. There is also NO catalog /
  Koidex lookup anywhere in the 13 Marketplace commands, so vendor risk for a
  never-installed item is simply not obtainable from this pack. Do not add a task that
  pretends otherwise.

  SO THE INVENTORY LOOKUP IS INVERTED INTO A DETECTION. Task 1 still runs
  koi-inventory-list, but the interesting answer is the UNEXPECTED one:
    total_count = 0  -> NOT_INSTALLED          - the block held. Expected. Low signal.
    total_count > 0  -> PRESENT_DESPITE_BLOCK  - the item is on endpoints anyway. HIGH signal:
                        grandfathered from before the policy, allowed for another endpoint
                        group, or acquired by a path the gateway does not cover (sideloaded,
                        or a marketplace outside the PAC - see docs/xql/G6.xql, where ~9 in 10
                        installs on this tenant are outside gateway scope).

  MATCHING BY NAME IS THE ONLY OPTION, AND IT IS FUZZY.
  approval_requests rows carry object_name + marketplace but NOT the marketplace item ID
  (object_id is the REQUEST's own UUID). koi-inventory-list's item_display_name filter was
  live-verified 2026-07-23 as a CASE-INSENSITIVE SUBSTRING match ("Chatly" and "chatly" both
  return the one "Chatly - AI Assistant for Every Tab" record). That is what makes the lookup
  possible at all, and also why a short or generic item name can over-match. The recommendation
  text says so rather than hiding it.

  MARKETPLACE VOCABULARY. Events use the SHORT form (chrome, vsc, software_windows); the API
  wants the LONG form (chrome_web_store, vscode, windows). Pass the mapped value into
  `marketplace`; keep the raw one in `marketplace_raw` for the record. The pack's parsing rule
  publishes marketplace_api for exactly this. An empty marketplace is tolerated - it is an
  optional FILTER on koi-inventory-list, not a required argument.

  ⚠️ THE REQUESTER IS A CLAIM, NOT AN IDENTITY. On endpoints running the PAC + CA but no KOI
  agent, the gateway cannot attribute the user - the request URL carries
  user_id=unknown&requestedBy=unknown - so the end user TYPES their own email into the form.
  A live row in this tenant reads `amahmoud@paltoaltonetworks.com`, a typo of the real domain
  that no directory lookup would ever produce. NEVER gate an approval on this field.

  NOTHING HERE MUTATES GOVERNANCE. koi-allowlist-items-add, koi-blocklist-items-add and
  koi-policy-status-update are all deliberately absent. Granting the exception is a human act
  performed in the KOI console (or via a separately-authorised playbook); this one gathers
  evidence, writes it to the alert with setAlert, and stops at a manual gate.
