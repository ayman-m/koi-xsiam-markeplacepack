inputs:
- key: item_name
  value: {}
  required: true
  description: 'Display name of the requested item, from the approval_requests audit row (object_name). Matched as a case-insensitive SUBSTRING against inventory.'
  playbookInputQuery: null
- key: marketplace
  value: {}
  required: false
  description: 'Marketplace in the API LONG vocabulary (chrome_web_store, vscode, windows). Optional filter on the inventory lookup. Use the parsing rule''s marketplace_api, never the raw event value.'
  playbookInputQuery: null
- key: marketplace_raw
  value: {}
  required: false
  description: 'Marketplace exactly as the event stated it, in the SHORT vocabulary (chrome, vsc, software_windows). Recorded for the audit trail; never passed to a command.'
  playbookInputQuery: null
- key: requester
  value: {}
  required: false
  description: 'Email of the requester. SELF-ASSERTED and unverified on endpoints without the KOI agent - never gate a decision on it.'
  playbookInputQuery: null
- key: decision
  value: {}
  required: false
  description: 'Current lifecycle state parsed from the event message: submitted, rejected or approved.'
  playbookInputQuery: null
- key: risk
  value: {}
  required: false
  description: 'Risk level as stated in the event message. Frequently ABSENT - the [risk: ..] segment is optional (6 of 11 rows carried it on 2026-07-23).'
  playbookInputQuery: null
- key: instance_name
  value: {}
  required: false
  description: Name of the KOI integration instance to run the KOI commands against.
  playbookInputQuery: null
- key: xql_instance
  value: {}
  required: false
  description: Name of the Cortex XDR - XQL Query Engine (or Core) instance for the decision-history query. Leave empty to use the default instance.
  playbookInputQuery: null
- key: lookback_days
  value:
    simple: "90"
  required: false
  description: Lookback window for the decision-history query.
  playbookInputQuery: null
outputs:
- contextPath: KoiApproval.presence
  description: 'NOT_INSTALLED (block held) or the matched inventory item_ids (PRESENT_DESPITE_BLOCK).'
  type: string
- contextPath: KoiApproval.summary
  description: Markdown evidence summary written to the alert.
  type: string
tests:
- No tests (auto formatted)
