    task:
      id: koiextgw-0000-4000-8000-000000000008
      version: -1
      name: Read global blocklist
      description: 'Global lists take precedence over custom policies, so an entry here is the strongest possible reason for the block. Note on tenant paet, 2026-07-23, the global blocklist was EMPTY - an empty result is normal and is not an error.'
      iscommand: true
      brand: ""
      script: '|||koi-blocklist-get'
      type: regular
    scriptarguments:
      limit:
        simple: "200"
      using:
        simple: ${inputs.instance_name}
    nexttasks:
      '#error#':
      - "9"
      '#none#':
      - "9"
    separatecontext: false
    continueonerror: true
    continueonerrortype: errorPath
    view: '{"position": {"x": 450, "y": 1160}}'
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "9":
    id: "9"
    taskid: koiextgw-0000-4000-8000-000000000009
    type: regular
    task:
      id: koiextgw-0000-4000-8000-000000000009
      version: -1
      name: Read allowlist
      description: Shows whether this item is already allowed somewhere - which would make the request redundant, or reveal that the block is scoped to one endpoint group while another group already has an exception.
      iscommand: true
      brand: ""
      script: '|||koi-allowlist-get'
      type: regular
    scriptarguments:
      limit:
        simple: "200"
      using:
        simple: ${inputs.instance_name}
    nexttasks:
      '#error#':
      - "10"
      '#none#':
      - "10"
    separatecontext: false
    continueonerror: true
    continueonerrortype: errorPath
    view: '{"position": {"x": 450, "y": 1320}}'
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "10":
    id: "10"
    taskid: koiextgw-0000-4000-8000-000000000010
    type: regular
    task:
      id: koiextgw-0000-4000-8000-000000000010
      version: -1
      name: Build reviewer summary
      description: 'Assembles the evidence into one markdown block for the reviewer. Deliberately states what is NOT known as well as what is: there is no catalog risk for a never-installed item anywhere in the 13 Marketplace commands, and the requester email is self-asserted on non-agent endpoints.'
      iscommand: false
      brand: ""
      script: Set
      type: regular
    scriptarguments:
      key:
        simple: KoiApproval.summary
      value:
        simple: |-
          ### KOI Gateway approval request — ${inputs.item_name}

          | Field | Value |
          |---|---|
          | Item | ${inputs.item_name} |
          | Marketplace | ${inputs.marketplace} (raw: ${inputs.marketplace_raw}) |
          | Requested by (SELF-ASSERTED) | ${inputs.requester} |
          | Current decision state | ${inputs.decision} |
          | Risk stated in event | ${inputs.risk} |
          | Estate presence | ${KoiApproval.presence} |
          | Matched inventory item_ids | ${Koi.Inventory.item_id} |
          | Prior requests | ${PaloAltoNetworksXQL.GenericQuery.results.requests} |
          | Distinct requesters | ${PaloAltoNetworksXQL.GenericQuery.results.distinct_requesters} |
          | Prior rejections | ${PaloAltoNetworksXQL.GenericQuery.results.prior_rejections} |
          | Prior approvals | ${PaloAltoNetworksXQL.GenericQuery.results.prior_approvals} |

          **What this evidence cannot tell you**
          - No vendor/catalog risk is available: the Marketplace pack has no Koidex/catalog
            command, and the item is not in inventory because the block prevented the install.
          - The gateway's own block record never reaches XSIAM, so the blocking policy is
            inferred from policy/blocklist configuration, not read from the block event.
          - The requester email is typed by the end user on endpoints without the KOI agent.
          - Item matching is a case-insensitive SUBSTRING on the display name; a short or
            generic name can over-match.
      append:
        simple: "false"
    nexttasks:
      '#none#':
      - "11"
    separatecontext: false
    continueonerror: true
    continueonerrortype: ""
    view: '{"position": {"x": 450, "y": 1480}}'
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "11":
    id: "11"
    taskid: koiextgw-0000-4000-8000-000000000011
    type: regular
    task:
      id: koiextgw-0000-4000-8000-000000000011
      version: -1
      name: Write findings to the alert
      description: 'Populates the KOI alert fields directly with setAlert - no classifier and no mapper, matching the rest of this pack. koiverdict carries the estate-presence result because that is the only machine-decidable finding available for a blocked item.'
      iscommand: true
      brand: ""
      script: '|||setAlert'
      type: regular
    scriptarguments:
      koiitemname:
        simple: ${inputs.item_name}
      koimarketplace:
        simple: ${inputs.marketplace}
      koimarketplaceraw:
        simple: ${inputs.marketplace_raw}
      koirisklevel:
        simple: ${inputs.risk}
      koideviceuser:
        simple: ${inputs.requester}
      koiverdict:
        simple: ${KoiApproval.presence}
      koiinvestigationsummary:
        simple: ${KoiApproval.summary}
    nexttasks:
      '#none#':
      - "12"
    separatecontext: false
    continueonerror: true
    continueonerrortype: ""
    view: '{"position": {"x": 450, "y": 1640}}'
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "12":
    id: "12"
    taskid: koiextgw-0000-4000-8000-000000000012
    type: regular
    task:
      id: koiextgw-0000-4000-8000-000000000012
      version: -1
      name: Reviewer decision (manual)
      description: 'THE STOPPING POINT, BY DESIGN. Granting a gateway exception changes the organization''s governance posture, so it is a human act. This playbook never calls koi-allowlist-items-add, koi-blocklist-items-remove or koi-policy-status-update. The reviewer acts in the KOI console (Operations > Requests) or through a separately-authorised playbook.'
      iscommand: false
      brand: ""
      type: regular
    nexttasks:
      '#none#':
      - "13"
    separatecontext: false
    continueonerrortype: ""
    view: '{"position": {"x": 450, "y": 1800}}'
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "13":
    id: "13"
    taskid: koiextgw-0000-4000-8000-000000000013
    type: title
    task:
      id: koiextgw-0000-4000-8000-000000000013
      version: -1
      name: Done
      type: title
      iscommand: false
      brand: ""
      description: ''
    separatecontext: false
    continueonerrortype: ""
    view: '{"position": {"x": 450, "y": 1960}}'
    note: false
