    separatecontext: false
    continueonerrortype: ""
    view: '{"position": {"x": 450, "y": 50}}'
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "1":
    id: "1"
    taskid: koiextgw-0000-4000-8000-000000000001
    type: regular
    task:
      id: koiextgw-0000-4000-8000-000000000001
      version: -1
      name: Look up requested item in inventory
      description: 'Searches the organization inventory for the REQUESTED item by display name. This is NOT enrichment - a blocked item is normally absent, because the block prevented the install. The lookup exists to catch the opposite case: the item present despite being blocked. item_display_name is a case-insensitive SUBSTRING filter (live-verified 2026-07-23), so a short name can over-match. marketplace is an optional filter and is passed only when known.'
      iscommand: true
      brand: ""
      script: '|||koi-inventory-list'
      type: regular
    scriptarguments:
      item_display_name:
        simple: ${inputs.item_name}
      marketplace:
        simple: ${inputs.marketplace}
      limit:
        simple: "50"
      using:
        simple: ${inputs.instance_name}
    nexttasks:
      '#error#':
      - "4"
      '#none#':
      - "2"
    separatecontext: false
    continueonerror: true
    continueonerrortype: errorPath
    view: '{"position": {"x": 450, "y": 200}}'
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "2":
    id: "2"
    taskid: koiextgw-0000-4000-8000-000000000002
    type: condition
    task:
      id: koiextgw-0000-4000-8000-000000000002
      version: -1
      name: Blocked item present in the estate anyway?
      description: 'The inverted test. Empty is the EXPECTED outcome for a blocked item and means the block held. Non-empty is the finding: the item is installed somewhere despite being blocked - grandfathered, allowed for another endpoint group, or acquired outside gateway scope.'
      iscommand: false
      brand: ""
      type: condition
    conditions:
    - label: "present"
      condition:
      - - left:
            iscontext: true
            value:
              simple: Koi.Inventory.item_id
          operator: isNotEmpty
          right:
            value: {}
    nexttasks:
      '#default#':
      - "4"
      "present":
      - "3"
    separatecontext: false
    continueonerrortype: ""
    view: '{"position": {"x": 450, "y": 360}}'
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "3":
    id: "3"
    taskid: koiextgw-0000-4000-8000-000000000003
    type: regular
    task:
      id: koiextgw-0000-4000-8000-000000000003
      version: -1
      name: Flag - present despite block
      description: The high-signal branch. Records that the requested item already exists in inventory even though it is blocked, and captures what was matched so a reviewer can judge whether the name filter over-matched.
      iscommand: false
      brand: ""
      script: Set
      type: regular
    scriptarguments:
      key:
        simple: KoiApproval.presence
      value:
        simple: PRESENT_DESPITE_BLOCK
      append:
        simple: "false"
    nexttasks:
