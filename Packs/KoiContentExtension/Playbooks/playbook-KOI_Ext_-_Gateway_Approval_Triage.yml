    type: regular
    task:
      id: koiextgw-0000-4000-8000-000000000007
      version: -1
      name: Read governance context - policies
      description: Lists the configured policies so the reviewer can see WHICH rule blocked the item. The gateway does not tell XSIAM why it blocked, so this is reconstructed from policy configuration rather than read from the block event.
      iscommand: true
      brand: ""
      script: '|||koi-policy-list'
      type: regular
    scriptarguments:
