id: KOI Ext - Hunt Sweep
version: -1
fromversion: 6.10.0
name: KOI Ext - Hunt Sweep
description: |-
  JOB-ATTACHABLE playbook for the KOI Content Extension pack (extends the Marketplace KOI pack v1.2.3, integration id "KOI", 13 commands). Attach it to a time-triggered Cortex Job (Investigation & Response > Jobs) - it is triggered by a JOB ON A SCHEDULE, NOT by a correlation rule. Like KOI Ext - Unified Script Runner it closes its own investigation at the end of every run.

  WHAT IT DOES:
  1. Runs a configurable SET of validated, cheap, high-signal hunting XQL queries in parallel via xdr-xql-generic-query (bodies embedded verbatim, parameterised only by xql_time_frame):
     - H2.1  items carrying compromise-grade KOI findings (malicious/spyware/ransomware/exfil/typosquat), deduped on notification_event_id;
     - H2.6  critical/high KOI known-bad NOT under governance (ungoverned known-bad);
     - H1.3  install bursts (one item across many hosts in a tight window);
     - H4.2  shadow agentic software (MCP/agent) executing in XDR that KOI never inventoried.
     The set is chosen by the hunt_set input (no playbook edit needed); default is the four above.
  2. Normalizes every match into a single KoiHunt.Matches array (via the sub-playbook), mapping the raw short-form marketplace to the API vocabulary.
  3. Gates on matches: zero -> posts 'hunt sweep clean' and closes.
  4. Investigates each match (bounded fan-out): item matches via KOI Ext - Investigate Item; host/shadow matches via Cortex core-get-endpoints, surfacing (never running) core-script-run to refresh a stale host.
  5. Posts ONE war-room markdown table of every match with its verdict.
  6. ANALYST-GATED response (never automatic): a confirmed known-bad, ungoverned item is routed to KOI Ext - Block and Remediate with auto_block=false, so the blocklist write requires human approval. A scheduled hunt NEVER auto-blocks.
  7. Closes the investigation.

  DEPENDENCY: this playbook's PURPOSE is running XQL, so the Cortex XDR - XQL Query Engine (xdr-xql-generic-query) is effectively REQUIRED for it - but the pack does not hard-depend on it. Every XQL task is continueonerror and the playbook fails gracefully: if the engine is absent it posts 'XQL engine unavailable - hunt sweep skipped' and closes.
