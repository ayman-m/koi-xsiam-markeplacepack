inputs:
- key: hunt_set
  value:
    simple: H2.1,H2.6,H1.3,H4.2
  required: false
  description: 'Which hunts to run, as a comma-separated set of hunt ids (default the four validated high-signal hunts: H2.1, H2.6, H1.3, H4.2). Tune which hunts run WITHOUT editing the playbook - e.g. set it to a subset, or point it at a List value (${lists.<name>}) that holds the set. A hunt runs only if its id appears in this string.'
  playbookInputQuery: null
- key: min_risk
  value:
    simple: high
  required: false
  description: 'Minimum item risk level eligible for the analyst-gated response route: critical, high (default), medium or low. Matches below this level are still investigated and summarized, but not routed to KOI Ext - Block and Remediate.'
  playbookInputQuery: null
- key: xql_time_frame
  value:
    simple: 7 days
  required: false
  description: Relative time frame for every hunt XQL query (e.g. '24 hours', '7 days'), passed to xdr-xql-generic-query. The hunt bodies are otherwise verbatim.
  playbookInputQuery: null
- key: auto_investigate
  value:
    simple: 'true'
  required: false
  description: true (default) investigates every match and routes eligible ones; false posts the raw matches and closes without investigating or routing.
  playbookInputQuery: null
- key: max_matches_to_investigate
  value:
    simple: '25'
  required: false
  description: Safety cap on how many matches PER HUNT are investigated (and per hunt routed to response), so a scheduled sweep never fans out unbounded. Default 25. Wired to the forEach loops' max. Each hunt body also carries its own XQL 'limit' (100-200) as a hard backstop, so fan-out is bounded even if this value is misconfigured.
  playbookInputQuery: null
- key: enable_response_gate
  value:
    simple: 'true'
  required: false
  description: true (default) routes confirmed known-bad, ungoverned matches to the analyst-gated KOI Ext - Block and Remediate (auto_block=false); false summarizes only.
  playbookInputQuery: null
- key: instance_name
  value: {}
  required: false
  description: The KOI integration instance to use. Leave empty for the single configured instance.
  playbookInputQuery: null
outputs:
- contextPath: KoiHunt.Matches
  description: The normalized array of every hunt match with its investigation verdict (hunt_id, match_kind, known_bad, item_id, item_name, marketplace, hostname, risk, reason, org_risk_level, exposure, governed, recommendation).
  type: unknown
- contextPath: RouteCandidates
  description: The subset of matches routed to the analyst-gated block (known_bad, ungoverned, meeting min_risk).
  type: unknown
- contextPath: KoiBlock.status
  description: Outcome of any analyst-gated block per routed match.
  type: string
tags:
- koi
- koi-ext
- job
quiet: false
