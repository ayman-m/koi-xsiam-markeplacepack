inputs:
- key: item_id
  value: {}
  required: true
  description: The KOI item ID (package / extension / MCP identifier).
  playbookInputQuery: null
- key: marketplace
  value: {}
  required: false
  description: 'The item''s marketplace (npm, chrome_web_store, vscode, docker, ...). Optional here even though koi-inventory-item-endpoints-list requires it: when omitted, it is resolved from the org inventory record. Supply it when you know it - it narrows the inventory lookup. EITHER vocabulary is accepted - a raw event value (software_windows, chrome, vsc) is mapped to the API vocabulary by tasks 17-20, and a value already in API form passes through unchanged. A value with no API equivalent (ollama, built_in, side_loaded) is treated as unknown and resolved from the org inventory instead.'
  playbookInputQuery: null
- key: version
  value: {}
  required: false
  description: 'The item version. Optional: when omitted, the version on the org inventory record is used. Supply the alert''s version when you specifically want the version that triggered the alert rather than the version the org runs.'
  playbookInputQuery: null
- key: instance_name
  value: {}
  required: false
  description: The KOI integration instance to use. Leave empty to use the single configured instance.
  playbookInputQuery: null
