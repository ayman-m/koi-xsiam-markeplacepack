id: KOI Ext - Enrich Item
version: -1
fromversion: 6.10.0
name: KOI Ext - Enrich Item
description: |-
  Sub-playbook. Lightweight, reusable enrichment for a KOI item: the organization's
  inventory record (risk level, numeric risk, version, marketplace) plus the endpoints
  carrying the item, aggregated into a compact KoiEnrichment object and a markdown summary.

  PACK: KOI Content Extension. Extends the Marketplace KOI pack v1.2.3 (13 commands,
  integration only). Uses only commands that pack ships.

  SUBSTITUTION vs the custom pack's "KOI - Enrich Item"
    koi-koidex-risk-report            -> koi-inventory-list(item_id, marketplace, limit=1)
    Koi.KoidexRiskReport.risk_level   -> Koi.Inventory.risk_level
    Koi.KoidexRiskReport.risk         -> Koi.Inventory.risk
  koi-inventory-list is used rather than koi-inventory-item-get because item-get requires
  version, and version is exactly what this playbook does not reliably have up front.

  ORDERING FIX (this was a latent bug in the original)
  On the Marketplace pack koi-inventory-item-endpoints-list requires item_id AND marketplace
  AND version - all three. The original fed version from an OPTIONAL playbook input, so the
  call failed whenever the caller had no version. Here the inventory lookup runs FIRST and
  version (and marketplace) fall back to Koi.Inventory.version / Koi.Inventory.marketplace
  when the caller does not supply them. Supplying them still wins.

  CAPABILITY DELTA - read this before trusting the numbers
  - Risk is now ORG-LOCAL, not catalog/vendor risk. koi-koidex-risk-report queried the KOI
    catalog for any item whether or not the org ran it. koi-inventory-list returns only the
    organization's inventory record, so risk_level, risk_score, version and marketplace come
    back empty both when nobody in the org has the item AND when the inventory index has
    simply not caught up with the event stream (VERIFIED_FACTS 7d.3: items present in events
    at 06:06 were still returning total_count 0 from the inventory API at 06:21). The two are
    indistinguishable from here, so an empty enrichment is INCONCLUSIVE / NOT YET INDEXED -
    it is the normal, expected outcome for a newly-appeared item, and it is never evidence
    that the organization does not have the item.
  - There is no AI risk summary and no Koidex compliance block anywhere in the 13 commands.
  - Because version is resolved from the org record, an org running a different version than
    the one that triggered an alert is enriched at the ORG's version. Pass the alert's
    version explicitly if that distinction matters.

  MARKETPLACE VOCABULARY MAPPING - WHY TASKS 17-20 EXIST (VERIFIED_FACTS 7c)
  The marketplace value a KOI event carries is NOT the value the KOI API accepts: events use
  short forms (software_windows, chrome, vsc, ...) while the API and this pack's YAML
  predefined lists use long forms (windows, chrome_web_store, vscode, ...). Only npm and pypi
  are spelled the same in both, so an unmapped event value returns HTTP 400 from
  koi-inventory-item-endpoints-list. The marketplace INPUT is therefore run through a static
  map before use. The map carries the 22 API values as identity rows, so it is idempotent and
  a caller already supplying an API value is unaffected. Koi.Inventory.marketplace is a
  COMMAND output, is already API-canonical, and is never re-mapped. An unrecognised value
  becomes EMPTY and routes to the inventory fallback.

  Both command tasks are continue-on-error by design: if the KOI API is unreachable the
  playbook still returns whatever it could gather. The endpoints call is additionally gated on
  version AND marketplace both being known - an unknown (item_id, marketplace, version) triple
  returns HTTP 404, not an empty 200 (VERIFIED_FACTS 7b), so it is skipped rather than failed.

  CONTEXT COLLISION WARNING: koi-inventory-list, koi-inventory-item-get and
  koi-inventory-search all write the same 27 Koi.Inventory.* paths and overwrite each other.
  Do not add a second inventory call to this playbook. koi-inventory-item-endpoints-list is
  safe - it writes only Koi.Inventory.Endpoint.* and collides with nothing.
