inputs:
- key: item_id
  value: {}
  required: true
  description: The KOI item ID (package / extension / MCP identifier).
  playbookInputQuery: null
- key: marketplace
  value: {}
  required: false
  description: 'The item''s marketplace. Optional: it is only a filter on koi-inventory-list, and when omitted the endpoint lookup takes its marketplace from the inventory record. Supply it to disambiguate an item ID that exists in more than one marketplace. EITHER vocabulary is accepted here - a raw event value (software_windows, chrome, vsc) is mapped to the API vocabulary by tasks 31-33, and a value already in API form passes through unchanged. A value with no API equivalent (ollama, built_in, side_loaded) is treated as unknown and resolved from the org inventory instead.'
  playbookInputQuery: null
- key: version
  value: {}
  required: false
  description: 'The item version to investigate. Optional: when omitted, the version on the org inventory record is used. Supply the alert''s version to investigate the version that triggered the alert rather than the version the organization runs.'
  playbookInputQuery: null
- key: instance_name
  value: {}
  required: false
  description: The KOI integration instance to use. Leave empty to use the single configured instance.
  playbookInputQuery: null
outputs:
- contextPath: KoiInvestigation
  description: The consolidated KOI investigation object.
  type: unknown
- contextPath: KoiInvestigation.org_risk_level
  description: The organization's risk level for the item. Not catalog risk - there is no catalog risk in this pack.
  type: string
- contextPath: KoiInvestigation.org_risk_score
  description: The organization's numeric risk for the item.
  type: number
- contextPath: KoiInvestigation.status
  description: The item's status on the org inventory record.
  type: string
- contextPath: KoiInvestigation.version
  description: The version the organization runs.
  type: string
- contextPath: KoiInvestigation.installs_count
  description: Number of installs across the organization.
  type: number
- contextPath: KoiInvestigation.endpoint_count
  description: Org-wide endpoint count from the inventory record.
  type: number
- contextPath: KoiInvestigation.is_signed
  description: Whether the item is signed.
  type: boolean
- contextPath: KoiInvestigation.publisher
  description: The item's publisher.
  type: string
- contextPath: KoiInvestigation.findings_count
  description: Number of KOI findings on the org inventory record.
  type: number
- contextPath: KoiInvestigation.governed_details
  description: KOI's governance detail for the item.
  type: unknown
- contextPath: KoiInvestigation.hostnames
  description: Hostnames of endpoints carrying the item.
  type: unknown
- contextPath: KoiInvestigation.affected_users
  description: Last logged-on users on the endpoints carrying the item.
  type: unknown
- contextPath: KoiInvestigation.blocklisted_count
  description: Number of blocklist entries matching this item (non-zero means already blocked).
  type: number
- contextPath: KoiInvestigation.allowlisted_count
  description: Number of allowlist entries matching this item (non-zero means explicitly allowed).
  type: number
- contextPath: KoiInvestigation.summary
  description: Markdown investigation summary, including an explicit statement of what this pack cannot determine.
  type: string
- contextPath: Koi.Inventory
  description: The organization's inventory record for the item.
  type: unknown
- contextPath: Koi.Inventory.Endpoint
  description: Endpoints carrying the item.
  type: unknown
