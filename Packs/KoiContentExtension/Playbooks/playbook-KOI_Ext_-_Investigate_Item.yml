id: KOI Ext - Investigate Item
version: -1
fromversion: 6.10.0
name: KOI Ext - Investigate Item
description: |-
  Sub-playbook. Comprehensive investigation of a KOI item, rebuilt from the command
  surface that actually exists. Gathers the organization's inventory record, endpoint and
  user exposure, and governance state (blocklist / allowlist) into a KoiInvestigation
  object plus a war-room markdown summary. Best-effort throughout (continue-on-error).

  PACK: KOI Content Extension. Extends the Marketplace KOI pack v1.2.3 (13 commands,
  integration only). Every command used here is one of those 13.

  WHY THIS IS A REBUILD
  The custom pack's "KOI - Investigate Item" needed koi-koidex-risk-report,
  koi-remediations-list and koi-approval-requests-list. NONE of the three exists in the
  Marketplace pack. Three of its six commands were therefore not swapped but removed, and
  the investigation was rebuilt around what remains.

  SUBSTITUTED
    koi-koidex-risk-report          -> koi-inventory-list(item_id, marketplace, limit=1)
    Koi.KoidexRiskReport.risk_level -> Koi.Inventory.risk_level
    Koi.KoidexRiskReport.risk       -> Koi.Inventory.risk

  REMOVED, NO SUBSTITUTE EXISTS
    ai_summary          (Koi.KoidexRiskReport.ai_risk_summary)
    remediation_count   (koi-remediations-list / Koi.Remediation)
    approval_count      (koi-approval-requests-list / Koi.ApprovalRequest)
  Do not try to reconstruct the last two from koi_koi_raw audit rows. The audit log does
  carry type="remediation" and type="approval_requests" events, but that is an XQL search,
  not a command; it is bounded by dataset retention rather than KOI's full history; and
  without the pack's parsing rule deployed there is no item_id column to join on.

  ADDED, because these exist here and were not in the original
    org_risk_score, status, findings_count, governed_details, allowlisted_count.
  Allowlist state is now read alongside blocklist state: "not blocked" and "explicitly
  allowed" are different governance answers and the original could only tell you the first.

  WHAT THIS VERSION CANNOT TELL YOU - state this to any analyst using it
  - No catalog / vendor-wide risk. Risk here is ORG-LOCAL: it comes from the organization's
    own inventory record. An item that is not installed anywhere in the org returns NO
    inventory record at all, so risk, publisher, signing and installs all come back empty -
    for exactly the newly-appeared item an alert is most likely to be about. Empty risk is
    not low risk.
  - No AI risk summary.
  - No remediation history - you cannot answer "has KOI ever remediated this item".
  - No approval history - you cannot answer "was this item ever requested or approved".
  The strengths that do survive are accurate: org installs, publisher, signing status,
  endpoint and user exposure, findings, governed details, and blocklist / allowlist state.

  MARKETPLACE VOCABULARY MAPPING - WHY TASKS 31-33 EXIST (VERIFIED_FACTS 7c)
  The marketplace value a KOI event carries is NOT the value the KOI API accepts: events use
  short forms (software_windows, chrome, vsc, ...) while the API and this pack's YAML
  predefined lists use long forms (windows, chrome_web_store, vscode, ...). Only npm and pypi
  are spelled the same in both, so an unmapped event value returns HTTP 400 from
  koi-inventory-item-endpoints-list. The marketplace INPUT of this playbook is therefore run
  through a static map before use. The map carries the 22 API values as identity rows, so it
  is idempotent: a caller that already supplies an API value (KOI Ext - Alert Triage does) is
  unaffected. Koi.Inventory.marketplace is a COMMAND output, is already API-canonical and is
  never re-mapped. An unrecognised value becomes EMPTY, which routes to the inventory fallback.

  CONTEXT COLLISION WARNING: koi-inventory-list, koi-inventory-item-get and
  koi-inventory-search all write the same 27 Koi.Inventory.* paths and overwrite each other.
  There is deliberately exactly one inventory call in this playbook. Do not add a second to
  "also fetch" something - it will replace the first. koi-inventory-item-endpoints-list is
  safe; it writes only Koi.Inventory.Endpoint.*.
