  description: The markdown triage summary.
  type: string
- contextPath: KoiTriage.org_risk_level
  description: The organization's inventory risk level for the alerted item (signal C).
  type: string
- contextPath: KoiTriage.org_risk_score
  description: The organization's numeric inventory risk score for the alerted item, captured alongside signal C.
  type: number
- contextPath: KoiTriage.marketplace
  description: The resolved marketplace for the alerted item, preferring the inventory record over the alert payload.
  type: string
- contextPath: KoiTriage.blocklisted_item
  description: The alerted item_id when it is already on the org blocklist, otherwise empty (signal D).
