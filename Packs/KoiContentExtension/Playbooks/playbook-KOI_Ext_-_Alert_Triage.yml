    scriptarguments:
      query:
        simple: "dataset = koi_koi_raw\n| filter source_log_type = \"Audit\"\n| filter hostname = \"${KoiContext.alert_hostname}\"\n| alter mins_from_alert = timestamp_diff(_time, to_timestamp(${KoiTriage.xdr_alert_epoch_ms}, \"MILLIS\"), \"MINUTE\")\n| filter abs(mins_from_alert) <= 60\n| alter lane   = \"KOI_SUPPLY_CHAIN\"\n| alter detail = coalesce(message, concat(coalesce(action, \"?\"), \" \", coalesce(object_name, \"?\")))\n| fields _time, mins_from_alert, lane, detail\n| union\n(dataset = xdr_data\n | filter event_type = ENUM.PROCESS\n | filter agent_hostname = \"${KoiContext.alert_hostname}\"\n | alter mins_from_alert = timestamp_diff(_time, to_timestamp(${KoiTriage.xdr_alert_epoch_ms}, \"MILLIS\"), \"MINUTE\")\n | filter abs(mins_from_alert) <= 60\n | alter lane   = if(actor_process_image_path contains \"Koi\", \"KOI_AGENT_SCAN\", \"XDR_EXECUTION\")\n | alter detail = coalesce(action_process_image_command_line, action_process_image_name)\n | fields _time, mins_from_alert, lane, detail)\n| union\n(dataset = xdr_data\n | filter event_type = ENUM.NETWORK\n | filter agent_hostname = \"${KoiContext.alert_hostname}\"\n | filter actor_process_image_name in (\"git.exe\", \"pip.exe\", \"pip3.exe\", \"npm.exe\", \"npx.exe\", \"node.exe\", \"curl.exe\", \"wget.exe\", \"python.exe\", \"winget.exe\", \"msiexec.exe\")\n | alter mins_from_alert = timestamp_diff(_time, to_timestamp(${KoiTriage.xdr_alert_epoch_ms}, \"MILLIS\"), \"MINUTE\")\n | filter abs(mins_from_alert) <= 60\n | alter lane   = \"XDR_EGRESS\"\n | alter detail = concat(coalesce(actor_process_image_name, \"?\"), \" -> \", coalesce(action_remote_ip, \"?\"), \":\", to_string(action_remote_port), \" (\", coalesce(action_country, \"?\"), \")\")\n | fields _time, mins_from_alert, lane, detail)\n| sort asc _time\n| limit 500"
