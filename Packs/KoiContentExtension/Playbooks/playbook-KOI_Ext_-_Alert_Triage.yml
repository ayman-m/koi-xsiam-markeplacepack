      name: Search for siblings of this notification
      description: 'SearchIncidentsV2 (CommonScripts - already a mandatory dependency of this pack). Returns every alert already created for the same KOI notification id inside the lookback window. Continue-on-error: if the field does not exist the search errors or returns nothing, the gate finds no duplicate, and triage proceeds - fail-open. Keep the lookback at least as long as KOI keeps re-sending a single alert; the longest re-send run observed on live data is 6.8 hours (408 deliveries, one per minute), so the 3-day default is generous. includeinformational IS DELIBERATELY TRUE AND MUST STAY TRUE: KOI risk_level "pending" maps to Informational severity, and pending is 19 of the 21 mcp_server alerts - i.e. precisely the cohort that is duplicated 40x. With the default (false) the search would silently miss the duplicates that matter most. limit is used rather than the deprecated size argument.'
      iscommand: false
      brand: ''
      script: SearchIncidentsV2
      type: regular
    scriptarguments:
