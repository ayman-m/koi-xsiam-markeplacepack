id: KOI Ext - Alert Triage
version: -1
fromversion: 6.10.0
name: KOI Ext - Alert Triage
description: |-
  End-to-end triage for a KOI alert, for the Marketplace KOI pack (Koi, v1.2.3 — 13 commands,
  integration only). Attach this as the playbook on KOI alerts ingested into Cortex XSIAM.

  Flow: KOI Ext - Extract Alert Context parses the alert payload into KoiContext ->
  DUPLICATE DELIVERIES OF THE SAME KOI ALERT ARE SUPPRESSED ->
  the item is looked up in the organization's inventory -> KOI Ext - Investigate Item ->
  the org blocklist is read -> KOI Ext - Investigate Device when the alert carries a device ->
  a verdict is computed -> a triage summary is posted -> Benign is auto-closed, Malicious
  raises severity and opens an ANALYST-GATED KOI Ext - Block and Remediate with auto_block
  forced false, Suspicious is left open for review.

  ============================================================================
  DUPLICATE ALERTS — READ THIS BEFORE DEPLOYING. YOU MUST CONFIGURE ONE OF THE TWO.
  ============================================================================
  The Marketplace KOI integration re-sends every still-open alert on every fetch cycle
  (eventFetchInterval defaults to 1 minute). koi_koi_raw therefore carries one row per alert
  PER FETCH. Live, 90 days to 2026-07-21, tenant api-ayman.xdr.eu. koi_koi_raw grows
  continuously, so the cohort census below and the dedupe measurement under it were taken
  minutes apart and their row totals differ; each figure is quoted against the total it was
  actually measured over, never against one notional total:

    item_type     rows   distinct notification ids   inflation   last seen
    extension      296            296                  1.0x      2026-07-09
    mcp_server     842             21                 40.1x      current
    ALL          1,138            317                  3.6x

  A separate query the same day over the same 90-day window returned 1,048 rows for the same
  317 distinct notification ids (~3.3x). Over the last 24 hours the ratio reaches ~245:1
  (734 rows -> 3 distinct notifications, measured 21 July 2026). One mcp_server notification
  was delivered 408 times in 6.8 hours. The duplication is confined to the mcp_server cohort — extension
  alerts arrive exactly once — but mcp_server is effectively 100% of current ingestion.

  UNCONTROLLED, THIS PLAYBOOK RUNS ONCE PER DELIVERY: one real KOI alert becomes up to 245
  full investigations, 245 device sweeps, 245 war-room summaries and, for a Malicious verdict,
  245 analyst approval gates. It also risks the correlation rule itself: Cortex XSIAM
  automatically DISABLES a correlation rule that reaches 5,000 hits in 24 hours, and at one
  delivery per minute per open alert that ceiling is roughly four concurrently-open KOI alerts.

  The only correct dedupe key is metadata.notification_event_id — 317 distinct values across
  1,048 rows (21 July 2026) and a verified 1:1 identity for
  (item.id, device.id, finding_info.uid, finding_info.created_time). It is 100% populated.
  Do NOT use finding_uid (3 distinct — it is the POLICY id), koi_event_id (20 distinct — the
  SCAN BATCH id) or the row _id (unique per duplicate). KOI Ext - Extract Alert Context now
  publishes it as KoiContext.notification_id.

  --- OPTION A (preferred): suppress at the correlation rule, so the alerts are never made.
  This pack's integration is EVENT-COLLECTION ONLY (isfetchevents, no fetch-incidents), so
  every KOI alert in your tenant is created by a correlation rule you wrote over koi_koi_raw.
  That is the only layer that can stop duplicate alerts from existing. In the correlation
  rule:
    1. Surface the key in the rule's XQL, e.g.
         | alter koi_notification_id = json_extract_scalar(metadata, "$.notification_event_id")
       (or use the koi_notification_id column this pack's parsing rule promotes).
    2. Turn on Issue Suppression: "Enable issues suppression", Fields = koi_notification_id,
       Duration time = 1 Day (the documented maximum, and comfortably longer than the 6.8-hour
       longest re-send run observed).
    3. Map koi_notification_id into an alert field in the rule's Issue Field Mapping — that
       field is also what Option B needs.
  Note the documented limit: suppression Duration caps at 1 day. An alert KOI keeps open for
  longer than a day can therefore still re-alert once per day. Option B catches those.

  --- OPTION B (this playbook, defence in depth): tasks 24-32.
  Set the dedupe_alert_field input to the machine name of the alert field carrying the
  notification id. The playbook then searches for an earlier alert with the same id and, if
  it finds one, closes this alert as a duplicate WITHOUT investigating. Its limits, stated
  plainly:
    - It needs that alert field to exist and be searchable. It cannot be done from context
      alone: a playbook cannot read another alert's context, so the key must be a field.
    - It is best-effort and not atomic. Two deliveries processed in the same instant could
      both pass the check. At one delivery per minute this is a narrow window, not a design
      guarantee.
    - It reacts AFTER the alert exists. The 245 alerts are still created and still counted
      against the correlation rule's 5,000/24h auto-disable ceiling; only the investigation
      is skipped. Option A is what prevents the alerts.
    - It FAILS OPEN. If the notification id is missing, the field name is not configured, or
      ${alert.id} does not resolve, the gate is skipped and the alert is triaged normally.
      Nothing here can close a first delivery.

  ============================================================================
  ALERT_TYPE IS NOT USABLE AS A DISCRIMINATOR ON THIS DATA
  ============================================================================
  The custom pack's version of this playbook branched on KoiContext.alert_type values
  "Removed from Marketplace" / "Publisher Compromised" / "Unvetted MCP Server" / "New Item".
  Live validation of koi_koi_raw (1,048 Alerts rows = 317 alert occurrences, 90 days to
  21 July 2026, tenant
  api-ayman.xdr.eu): alert_type has EXACTLY ONE distinct value — "policy_violation". Every
  one of those branches was dead. They have been removed rather than shipped as dead code,
  and the verdict has been re-keyed onto signals that actually vary. alert_type is still
  shown in the triage summary for the record; it is never tested.

  ============================================================================
  VERDICT MATRIX
  ============================================================================
  Four signals, all captured as scalars before any device-wide inventory call can overwrite
  them. Labels are evaluated top to bottom; the first that matches wins.

    A  KoiContext.risk_level      the alert's own risk level. Live distribution per ALERT
                                  OCCURRENCE over 90 days:
                                  low 204 | medium 52 | pending 50 | high 8 | critical 3.
                                  All five vocabulary values occur — no literal below is dead.
                                  (severity is 1:1 with this: Low/Medium/Informational/High/Critical.)
    B  KoiContext.item_type       extension 296 | mcp_server 21. Both literals occur.
    C  KoiTriage.org_risk_level   Koi.Inventory.risk_level for this item from the organization's
                                  own inventory — the substitute for the custom pack's
                                  koi-koidex-risk-report. EMPTY IS INCONCLUSIVE, NOT "CLEAN" AND
                                  NOT "ABSENT FROM THE ORG": the inventory index lags the event
                                  stream (VERIFIED_FACTS 7d.3 — items visible in events at
                                  06:06 were still returning total_count 0 from the inventory
                                  API at 06:21), so the freshly-alerted item an alert is most
                                  likely to be about routinely has no inventory record YET.
    D  KoiTriage.blocklisted_item non-empty when item_id already appears in koi-blocklist-get.

    MALICIOUS   if ANY of:  A in {critical, high}
                            C in {critical, high}
                            D non-empty
      Rationale. A is the alert's own assessment and only 11 of 317 alert occurrences reach
      high/critical, so escalating all of them is affordable. C catches the case where the
      alert itself is unremarkable but the same item is rated high/critical against the org's
      installed base. D is a governance breach: the item is already forbidden org-wide and is
      still generating alerts, which is worth an analyst either way.

    SUSPICIOUS  if ANY of:  B = mcp_server
                            A in {medium, pending}
                            C = medium
      Rationale. mcp_server is never auto-closed: MCP servers are the least-vetted surface in
      the estate (live data: their risk_level is "pending" on 19 of 21 occurrences and
      "critical" on 2 — the distribution contains no assessed-low value at all), and they are
      the one item type whose alerts carry NO marketplace, which means automated response
      cannot address them anyway. "pending" is an unfinished assessment, not a clean bill of
      health, so it must not close. medium on either the alert or the org record stays open.
      NOTE the changed economics: mcp_server was 21 of 317 occurrences over 90 days but is
      effectively 100% of current ingestion (no extension alert since 2026-07-09), so this is
      no longer a bounded-cost branch — it is the main one. Duplicate suppression, not a
      narrower rule, is what keeps the review cost down.

    BENIGN      only if ALL of:  A = low  AND  B = extension
      Rationale. Reached only after MALICIOUS and SUSPICIOUS have both failed, so by evaluation
      order it also implies C is not high/critical/medium and the item is not blocklisted. This
      is the single auto-close path and it is the narrowest of the three. Be aware of what an
      empty C contributes here: because the inventory index lags, a genuinely new item can
      auto-close on A and B alone. That is deliberate — A=low is KOI's own assessment of the
      item that triggered the alert — but the close note must not be read as "the org has
      never seen this item".

    DEFAULT -> SUSPICIOUS. Anything unclassified — empty risk_level, an item_type or risk level
      the vendor adds later, a failed lookup — stays open for a human. Suspicious remains the
      safe default, exactly as in the original.

  ============================================================================
  SUBSTITUTIONS vs the custom pack (KOI v1.3.0, 26 commands)
  ============================================================================
    - koi-koidex-risk-report(item_id, marketplace)
        -> koi-inventory-list(item_id, marketplace, limit=1)
      Koi.KoidexRiskReport.risk_level -> Koi.Inventory.risk_level (captured as
      KoiTriage.org_risk_level). koi-inventory-item-get is NOT usable as the substitute: it
      requires item_id AND marketplace AND version, all three, and version is not known here.
      Capability delta: this is the ORGANIZATION's risk record, not the vendor catalog's. It
      returns nothing both when nobody in the org has the item AND when the inventory index has
      simply not caught up with the event stream yet — and the two are indistinguishable from
      here. C is therefore empty for exactly the newly-appeared item an alert is most likely to
      be about, and the verdict then rests on A, B and D. Report an empty C as INCONCLUSIVE /
      NOT YET INDEXED, never as "the organization does not have this item".
      Koi.KoidexRiskReport.ai_risk_summary and the Koidex compliance block have no equivalent
      among the 13 commands and are gone from the summary.
    - Sub-playbooks repointed to KOI Ext - Extract Alert Context, KOI Ext - Investigate Item,
      KOI Ext - Investigate Device and KOI Ext - Block and Remediate.

  ============================================================================
  ORDERING AND CONTEXT HAZARDS (do not reorder tasks casually)
  ============================================================================
    1. koi-inventory-list APPENDS to Koi.Inventory, and KOI Ext - Investigate Device lists up
       to 500 items for a whole host into the same path. The org risk level and marketplace are
       therefore captured into KoiTriage.* scalars BEFORE the device investigation runs. Move
       the device task earlier and the verdict will start reading a device-wide array.
    2. LastArrayElement, not FirstArrayElement, is used when reading Koi.Inventory — because the
       path is appended to, the last element is this playbook's own lookup.
    3. The blocklist read is inside the item branch, so KoiTriage.blocklisted_item is only ever
       evaluated when an item_id exists.
    4. marketplace: the vocabulary a KOI event uses is NOT the vocabulary the KOI API accepts
       (VERIFIED_FACTS 7c) - events say software_windows / chrome / vsc where the API wants
       windows / chrome_web_store / vscode, and only npm and pypi are spelled the same in
       both. This playbook never touches a raw event value: KOI Ext - Extract Alert Context
       does the mapping and publishes the API-safe KoiContext.marketplace (plus
       KoiContext.marketplace_raw for the record). KoiTriage.marketplace is seeded from the
       MAPPED value, then overwritten by Koi.Inventory.marketplace when the inventory lookup
       returned one - that is a COMMAND output, already API-canonical, and is used as-is
       rather than re-mapped. Both are therefore safe to pass to the sub-playbooks. AN EMPTY
       MARKETPLACE IS NOW THE COMMON CASE, NOT THE EXCEPTION: no mcp_server alert carries one
       (0 of 21), no extension alert has arrived since 2026-07-09, and the inventory fallback
       that used to recover it also comes back empty while the index lags. Expect the item
       branch to run with marketplace unknown on most current alerts. Nothing here requires it
       — the item gate keys on item_id alone (task 2), koi-inventory-list takes marketplace as
       an optional FILTER, and KOI Ext - Block and Remediate re-resolves it by item_id and
       SKIPS the blocklist write rather than making a malformed call if it still cannot.
