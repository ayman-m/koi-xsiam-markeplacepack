            value:
              simple: KoiContext.risk_level
          operator: isEqualString
          right:
            value:
              simple: medium
        - left:
            iscontext: true
            value:
              simple: KoiContext.risk_level
          operator: isEqualString
          right:
            value:
              simple: pending
        - left:
            iscontext: true
            value:
              simple: KoiTriage.org_risk_level
          operator: isEqualString
          right:
            value:
              simple: medium
    - label: benign
