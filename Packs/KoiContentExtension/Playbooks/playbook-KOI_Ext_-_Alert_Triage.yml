      version: -1
      name: Determine verdict
      description: 'The verdict matrix. Labels are evaluated in order; first match wins. MALICIOUS: alert risk high/critical, OR org inventory risk high/critical, OR the item is already blocklisted. SUSPICIOUS: item_type mcp_server, OR alert risk medium/pending, OR org risk medium. BENIGN: alert risk low AND item_type extension (reachable only after both tests above failed). Default is Suspicious. alert_type is deliberately not tested - it has exactly one distinct value, policy_violation, on all 317 distinct alerts across the 1,048 live alert rows measured 21 July 2026.'
      iscommand: false
      brand: ''
      type: condition
    conditions:
    - label: malicious
      condition:
      - - left:
            iscontext: true
            value:
              simple: KoiContext.risk_level
          operator: isEqualString
          right:
            value:
              simple: critical
        - left:
            iscontext: true
            value:
              simple: KoiContext.risk_level
          operator: isEqualString
          right:
            value:
              simple: high
        - left:
            iscontext: true
            value:
              simple: KoiTriage.org_risk_level
          operator: isEqualString
          right:
            value:
              simple: critical
        - left:
            iscontext: true
            value:
              simple: KoiTriage.org_risk_level
          operator: isEqualString
          right:
            value:
              simple: high
        - left:
            iscontext: true
            value:
              simple: KoiTriage.blocklisted_item
          operator: isNotEmpty
          right:
            value: {}
