      description: 'Substitutes koi-koidex-risk-report, which does not exist in the Marketplace pack. Returns the ORGANIZATION''s record for the item: risk_level, risk score, publisher, signing, install and endpoint counts, and the API-canonical marketplace value. The marketplace argument is fed from KoiContext.marketplace, the value KOI Ext - Extract Alert Context has already mapped onto the API vocabulary; passing the raw event value would return HTTP 400 and lose signal C of the verdict matrix. It is only a FILTER here, so an empty value simply widens the lookup - which is what happens on most current alerts, since no mcp_server alert carries a marketplace and mcp_server is effectively all of today''s ingestion. Continue-on-error: a failed lookup leaves C empty and the verdict falls back to A, B and D. AN EMPTY OR ZERO-ROW RESULT IS INCONCLUSIVE, NOT AN ABSENCE - the inventory index lags the event stream (VERIFIED_FACTS 7d.3), so the newly-alerted item this playbook is most often called about has no inventory record yet.'
      iscommand: true
      brand: ''
      script: '|||koi-inventory-list'
      type: regular
    scriptarguments:
