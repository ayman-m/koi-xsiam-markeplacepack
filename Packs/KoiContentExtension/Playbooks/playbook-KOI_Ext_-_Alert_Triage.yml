          | Item version | ${KoiContext.item_version} |

          | Device | ${KoiContext.alert_hostname} (${KoiContext.device_id}) |

          | Last user | ${KoiContext.device_last_user} |

          | Alert type | ${KoiContext.alert_type} (constant "policy_violation" on this data - not used in the verdict) |

