id: KOI Ext - Alert Triage
version: -1
fromversion: 6.10.0
name: KOI Ext - Alert Triage
description: "End-to-end triage for a KOI alert, for the Marketplace KOI pack (Koi, v1.2.3 — 13 commands,\nintegration only). Attach this as the playbook on KOI alerts ingested into Cortex XSIAM.\n\nFlow: KOI Ext - Extract Alert Context parses the alert payload into KoiContext ->\nDUPLICATE DELIVERIES OF THE SAME KOI ALERT ARE SUPPRESSED ->\nthe item is looked up in the organization's inventory -> KOI Ext - Investigate Item ->\nthe org blocklist is read -> KOI Ext - Investigate Device when the alert carries a device ->\na verdict is computed -> a triage summary is posted -> Benign is auto-closed, Malicious\nraises severity and opens an ANALYST-GATED KOI Ext - Block and Remediate with auto_block\nforced false, Suspicious is left open for review.\n\n============================================================================\nDUPLICATE ALERTS — READ THIS BEFORE DEPLOYING. YOU MUST CONFIGURE ONE OF THE TWO.\n============================================================================\nThe Marketplace KOI integration re-sends every still-open alert on every fetch cycle\n(eventFetchInterval defaults to 1 minute). koi_koi_raw therefore carries one row per alert\nPER FETCH. Live, 90 days to 2026-07-21, tenant api-ayman.xdr.eu. koi_koi_raw grows\ncontinuously, so the cohort census below and the dedupe measurement under it were taken\nminutes apart and their row totals differ; each figure is quoted against the total it was\nactually measured over, never against one notional total:\n\n  item_type     rows   distinct notification ids   inflation   last seen\n  extension      296            296                  1.0x      2026-07-09\n  mcp_server     842             21                 40.1x      current\n  ALL          1,138            317                  3.6x\n\nA separate query the same day over the same 90-day window returned 1,048 rows for the same\n317 distinct notification ids (~3.3x). Over the last 24 hours the ratio reaches ~245:1\n(734 rows -> 3 distinct notifications, measured 21 July 2026). One mcp_server notification\nwas delivered 408 times in 6.8 hours. The duplication is confined to the mcp_server cohort — extension\nalerts arrive exactly once — but mcp_server is effectively 100% of current ingestion.\n\nUNCONTROLLED, THIS PLAYBOOK RUNS ONCE PER DELIVERY: one real KOI alert becomes up to 245\nfull investigations, 245 device sweeps, 245 war-room summaries and, for a Malicious verdict,\n245 analyst approval gates. It also risks the correlation rule itself: Cortex XSIAM\nautomatically DISABLES a correlation rule that reaches 5,000 hits in 24 hours, and at one\ndelivery per minute per open alert that ceiling is roughly four concurrently-open KOI alerts.\n\nThe only correct dedupe key is metadata.notification_event_id — 317 distinct values across\n1,048 rows (21 July 2026) and a verified 1:1 identity for\n(item.id, device.id, finding_info.uid, finding_info.created_time). It is 100% populated.\nDo NOT use finding_uid (3 distinct — it is the POLICY id), koi_event_id (20 distinct — the\nSCAN BATCH id) or the row _id (unique per duplicate). KOI Ext - Extract Alert Context now\npublishes it as KoiContext.notification_id.\n\n--- OPTION A (preferred): suppress at the correlation rule, so the alerts are never made.\nThis pack's integration is EVENT-COLLECTION ONLY (isfetchevents, no fetch-incidents), so\nevery KOI alert in your tenant is created by a correlation rule you wrote over koi_koi_raw.\nThat is the only layer that can stop duplicate alerts from existing. In the correlation\nrule:\n  1. Surface the key in the rule's XQL, e.g.\n       | alter koi_notification_id = json_extract_scalar(metadata, \"$.notification_event_id\")\n     (or use the koi_notification_id column this pack's parsing rule promotes).\n  2. Turn on Issue Suppression: \"Enable issues suppression\", Fields = koi_notification_id,\n     Duration time = 1 Day (the documented maximum, and comfortably longer than the 6.8-hour\n     longest re-send run observed).\n  3. Map koi_notification_id into an alert field in the rule's Issue Field Mapping — that\n     field is\
  \ also what Option B needs.\nNote the documented limit: suppression Duration caps at 1 day. An alert KOI keeps open for\nlonger than a day can therefore still re-alert once per day. Option B catches those.\n\n--- OPTION B (this playbook, defence in depth): tasks 24-32.\nSet the dedupe_alert_field input to the machine name of the alert field carrying the\nnotification id. The playbook then searches for an earlier alert with the same id and, if\nit finds one, closes this alert as a duplicate WITHOUT investigating. Its limits, stated\nplainly:\n  - It needs that alert field to exist and be searchable. It cannot be done from context\n    alone: a playbook cannot read another alert's context, so the key must be a field.\n  - It is best-effort and not atomic. Two deliveries processed in the same instant could\n    both pass the check. At one delivery per minute this is a narrow window, not a design\n    guarantee.\n  - It reacts AFTER the alert exists. The 245 alerts are still created and still counted\n    against the correlation rule's 5,000/24h auto-disable ceiling; only the investigation\n    is skipped. Option A is what prevents the alerts.\n  - It FAILS OPEN. If the notification id is missing, the field name is not configured, or\n    ${alert.id} does not resolve, the gate is skipped and the alert is triaged normally.\n    Nothing here can close a first delivery.\n\n============================================================================\nALERT_TYPE IS NOT USABLE AS A DISCRIMINATOR ON THIS DATA\n============================================================================\nThe custom pack's version of this playbook branched on KoiContext.alert_type values\n\"Removed from Marketplace\" / \"Publisher Compromised\" / \"Unvetted MCP Server\" / \"New Item\".\nLive validation of koi_koi_raw (1,048 Alerts rows = 317 alert occurrences, 90 days to\n21 July 2026, tenant\napi-ayman.xdr.eu): alert_type has EXACTLY ONE distinct value — \"policy_violation\". Every\none of those branches was dead. They have been removed rather than shipped as dead code,\nand the verdict has been re-keyed onto signals that actually vary. alert_type is still\nshown in the triage summary for the record; it is never tested.\n\n============================================================================\nVERDICT MATRIX\n============================================================================\nFour signals, all captured as scalars before any device-wide inventory call can overwrite\nthem. Labels are evaluated top to bottom; the first that matches wins.\n\n  A  KoiContext.risk_level      the alert's own risk level. Live distribution per ALERT\n                                OCCURRENCE over 90 days:\n                                low 204 | medium 52 | pending 50 | high 8 | critical 3.\n                                All five vocabulary values occur — no literal below is dead.\n                                (severity is 1:1 with this: Low/Medium/Informational/High/Critical.)\n  B  KoiContext.item_type       extension 296 | mcp_server 21. Both literals occur.\n  C  KoiTriage.org_risk_level   Koi.Inventory.risk_level for this item from the organization's\n                                own inventory — the substitute for the custom pack's\n                                koi-koidex-risk-report. EMPTY IS INCONCLUSIVE, NOT \"CLEAN\" AND\n                                NOT \"ABSENT FROM THE ORG\": the inventory index lags the event\n                                stream (VERIFIED_FACTS 7d.3 — items visible in events at\n                                06:06 were still returning total_count 0 from the inventory\n                                API at 06:21), so the freshly-alerted item an alert is most\n                                likely to be about routinely has no inventory record YET.\n  D  KoiTriage.blocklisted_item non-empty when item_id already appears in koi-blocklist-get.\n\n  MALICIOUS   if ANY of:  A in {critical, high}\n                          C in {critical, high}\n                          D non-empty\n    Rationale. A is the alert's\
  \ own assessment and only 11 of 317 alert occurrences reach\n    high/critical, so escalating all of them is affordable. C catches the case where the\n    alert itself is unremarkable but the same item is rated high/critical against the org's\n    installed base. D is a governance breach: the item is already forbidden org-wide and is\n    still generating alerts, which is worth an analyst either way.\n\n  SUSPICIOUS  if ANY of:  B = mcp_server\n                          A in {medium, pending}\n                          C = medium\n    Rationale. mcp_server is never auto-closed: MCP servers are the least-vetted surface in\n    the estate (live data: their risk_level is \"pending\" on 19 of 21 occurrences and\n    \"critical\" on 2 — the distribution contains no assessed-low value at all), and they are\n    the one item type whose alerts carry NO marketplace, which means automated response\n    cannot address them anyway. \"pending\" is an unfinished assessment, not a clean bill of\n    health, so it must not close. medium on either the alert or the org record stays open.\n    NOTE the changed economics: mcp_server was 21 of 317 occurrences over 90 days but is\n    effectively 100% of current ingestion (no extension alert since 2026-07-09), so this is\n    no longer a bounded-cost branch — it is the main one. Duplicate suppression, not a\n    narrower rule, is what keeps the review cost down.\n\n  BENIGN      only if ALL of:  A = low  AND  B = extension\n    Rationale. Reached only after MALICIOUS and SUSPICIOUS have both failed, so by evaluation\n    order it also implies C is not high/critical/medium and the item is not blocklisted. This\n    is the single auto-close path and it is the narrowest of the three. Be aware of what an\n    empty C contributes here: because the inventory index lags, a genuinely new item can\n    auto-close on A and B alone. That is deliberate — A=low is KOI's own assessment of the\n    item that triggered the alert — but the close note must not be read as \"the org has\n    never seen this item\".\n\n  DEFAULT -> SUSPICIOUS. Anything unclassified — empty risk_level, an item_type or risk level\n    the vendor adds later, a failed lookup — stays open for a human. Suspicious remains the\n    safe default, exactly as in the original.\n\n============================================================================\nSUBSTITUTIONS vs the custom pack (KOI v1.3.0, 26 commands)\n============================================================================\n  - koi-koidex-risk-report(item_id, marketplace)\n      -> koi-inventory-list(item_id, marketplace, limit=1)\n    Koi.KoidexRiskReport.risk_level -> Koi.Inventory.risk_level (captured as\n    KoiTriage.org_risk_level). koi-inventory-item-get is NOT usable as the substitute: it\n    requires item_id AND marketplace AND version, all three, and version is not known here.\n    Capability delta: this is the ORGANIZATION's risk record, not the vendor catalog's. It\n    returns nothing both when nobody in the org has the item AND when the inventory index has\n    simply not caught up with the event stream yet — and the two are indistinguishable from\n    here. C is therefore empty for exactly the newly-appeared item an alert is most likely to\n    be about, and the verdict then rests on A, B and D. Report an empty C as INCONCLUSIVE /\n    NOT YET INDEXED, never as \"the organization does not have this item\".\n    Koi.KoidexRiskReport.ai_risk_summary and the Koidex compliance block have no equivalent\n    among the 13 commands and are gone from the summary.\n  - Sub-playbooks repointed to KOI Ext - Extract Alert Context, KOI Ext - Investigate Item,\n    KOI Ext - Investigate Device and KOI Ext - Block and Remediate.\n\n============================================================================\nORDERING AND CONTEXT HAZARDS (do not reorder tasks casually)\n============================================================================\n  1. koi-inventory-list APPENDS to Koi.Inventory, and KOI Ext - Investigate Device lists up\n     to 500 items for a whole host into\
  \ the same path. The org risk level and marketplace are\n     therefore captured into KoiTriage.* scalars BEFORE the device investigation runs. Move\n     the device task earlier and the verdict will start reading a device-wide array.\n  2. LastArrayElement, not FirstArrayElement, is used when reading Koi.Inventory — because the\n     path is appended to, the last element is this playbook's own lookup.\n  3. The blocklist read is inside the item branch, so KoiTriage.blocklisted_item is only ever\n     evaluated when an item_id exists.\n  4. marketplace: the vocabulary a KOI event uses is NOT the vocabulary the KOI API accepts\n     (VERIFIED_FACTS 7c) - events say software_windows / chrome / vsc where the API wants\n     windows / chrome_web_store / vscode, and only npm and pypi are spelled the same in\n     both. This playbook never touches a raw event value: KOI Ext - Extract Alert Context\n     does the mapping and publishes the API-safe KoiContext.marketplace (plus\n     KoiContext.marketplace_raw for the record). KoiTriage.marketplace is seeded from the\n     MAPPED value, then overwritten by Koi.Inventory.marketplace when the inventory lookup\n     returned one - that is a COMMAND output, already API-canonical, and is used as-is\n     rather than re-mapped. Both are therefore safe to pass to the sub-playbooks. AN EMPTY\n     MARKETPLACE IS NOW THE COMMON CASE, NOT THE EXCEPTION: no mcp_server alert carries one\n     (0 of 21), no extension alert has arrived since 2026-07-09, and the inventory fallback\n     that used to recover it also comes back empty while the index lags. Expect the item\n     branch to run with marketplace unknown on most current alerts. Nothing here requires it\n     — the item gate keys on item_id alone (task 2), koi-inventory-list takes marketplace as\n     an optional FILTER, and KOI Ext - Block and Remediate re-resolves it by item_id and\n     SKIPS the blocklist write rather than making a malformed call if it still cannot.\n\n============================================================================\nOPTIONAL XDR ENRICHMENT (Theme D / D5) — best-effort, degrades gracefully\n============================================================================\nA parallel right-hand lane (tasks 33-39) enriches the triage with what Cortex XDR endpoint\ntelemetry saw. It runs ONE XQL query (Theme D / D5) via xdr-xql-generic-query to rebuild the\nhour either side of this alert on its host: KOI supply-chain audit events, host process\nexecutions (with the KOI agent scan split into its own lane), and egress from code-pulling\nprocesses. It is keyed on ${KoiContext.alert_hostname} and centred on the alert time\n(finding_info.created_time, epoch ms). This introduces a dependency on the Cortex XDR - XQL\nQuery Engine integration, which is NOT the KOI integration and is NOT part of this pack; it is\ndeclared OPTIONAL (mandatory:false) in pack_metadata.json (pack CortexXDR; on Cortex platform\nthe same command ships in Core). The lane hangs off the first-delivery convergence (tasks\n31/32), so it runs only for non-duplicate alerts; it is entirely continue-on-error and runs in\nPARALLEL with the verdict, the analyst gate and the auto-close, never blocking or altering any\nof them. Missing hostname/time, or the engine absent/slow/rate-limited, and the lane is skipped\nor errors while triage completes normally. The D5 query reads koi_koi_raw source_log_type =\n\"Audit\" (NOT Alerts) and xdr_data, so the Alerts dedupe rule does not apply."
