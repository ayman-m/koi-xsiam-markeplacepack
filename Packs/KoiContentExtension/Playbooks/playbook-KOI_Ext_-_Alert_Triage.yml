id: KOI Ext - Alert Triage
version: -1
fromversion: 6.10.0
name: KOI Ext - Alert Triage
description: |-
  End-to-end triage for a KOI alert, for the Marketplace KOI pack (Koi, v1.2.3 — 13 commands,
  integration only). Attach this as the playbook on KOI alerts ingested into Cortex XSIAM.

  Flow: KOI Ext - Extract Alert Context parses the alert payload into KoiContext ->
  the item is looked up in the organization's inventory -> KOI Ext - Investigate Item ->
  the org blocklist is read -> KOI Ext - Investigate Device when the alert carries a device ->
  a verdict is computed -> a triage summary is posted -> Benign is auto-closed, Malicious
  raises severity and opens an ANALYST-GATED KOI Ext - Block and Remediate with auto_block
  forced false, Suspicious is left open for review.

  ============================================================================
  ALERT_TYPE IS NOT USABLE AS A DISCRIMINATOR ON THIS DATA
  ============================================================================
  The custom pack's version of this playbook branched on KoiContext.alert_type values
  "Removed from Marketplace" / "Publisher Compromised" / "Unvetted MCP Server" / "New Item".
  Live validation of koi_koi_raw (314 Alerts rows, 90 days, tenant api-ayman.xdr.eu):
  alert_type has EXACTLY ONE distinct value — "policy_violation" — on 314/314 rows. Every one
  of those branches was dead. They have been removed rather than shipped as dead code, and
  the verdict has been re-keyed onto signals that actually vary. alert_type is still shown in
  the triage summary for the record; it is never tested.

  ============================================================================
  VERDICT MATRIX
  ============================================================================
  Four signals, all captured as scalars before any device-wide inventory call can overwrite
  them. Labels are evaluated top to bottom; the first that matches wins.

    A  KoiContext.risk_level      the alert's own risk level. Live distribution over 90 days:
                                  low 204 | medium 52 | pending 47 | high 8 | critical 3.
                                  (severity is 1:1 with this: Low/Medium/Informational/High/Critical.)
    B  KoiContext.item_type       extension 296 | mcp_server 18.
    C  KoiTriage.org_risk_level   Koi.Inventory.risk_level for this item from the organization's
                                  own inventory — the substitute for the custom pack's
                                  koi-koidex-risk-report. Empty when the item is not installed
                                  anywhere in the org.
    D  KoiTriage.blocklisted_item non-empty when item_id already appears in koi-blocklist-get.

    MALICIOUS   if ANY of:  A in {critical, high}
                            C in {critical, high}
                            D non-empty
      Rationale. A is the alert's own assessment and only 11 of 314 alerts reach high/critical,
      so escalating all of them is affordable. C catches the case where the alert itself is
      unremarkable but the same item is rated high/critical against the org's installed base.
      D is a governance breach: the item is already forbidden org-wide and is still generating
      alerts, which is worth an analyst either way.

    SUSPICIOUS  if ANY of:  B = mcp_server
                            A in {medium, pending}
                            C = medium
      Rationale. mcp_server is never auto-closed: MCP servers are the least-vetted surface in
      the estate (live data: mcp_risk_level is "pending" on 16 of 18 and "critical" on 2 — the
      distribution contains no assessed-low value at all), they are only 18 of 314 alerts so the
      review cost is bounded, and they are the one item type whose alerts carry no marketplace,
      which means automated response cannot address them anyway. "pending" is an unfinished
      assessment, not a clean bill of health, so it must not close. medium on either the alert
      or the org record stays open.

    BENIGN      only if ALL of:  A = low  AND  B = extension
      Rationale. Reached only after MALICIOUS and SUSPICIOUS have both failed, so by evaluation
      order it also implies C is not high/critical/medium and the item is not blocklisted. This
      is the single auto-close path and it is the narrowest of the three.

    DEFAULT -> SUSPICIOUS. Anything unclassified — empty risk_level, an item_type or risk level
      the vendor adds later, a failed lookup — stays open for a human. Suspicious remains the
      safe default, exactly as in the original.

  ============================================================================
  SUBSTITUTIONS vs the custom pack (KOI v1.3.0, 26 commands)
  ============================================================================
    - koi-koidex-risk-report(item_id, marketplace)
        -> koi-inventory-list(item_id, marketplace, limit=1)
      Koi.KoidexRiskReport.risk_level -> Koi.Inventory.risk_level (captured as
      KoiTriage.org_risk_level). koi-inventory-item-get is NOT usable as the substitute: it
      requires item_id AND marketplace AND version, all three, and version is not known here.
      Capability delta: this is the ORGANIZATION's risk record, not the vendor catalog's. An
      item nobody in the org has installed returns nothing, so C is empty for exactly the
      newly-appeared item an alert is most likely to be about, and the verdict then rests on
      A, B and D. Koi.KoidexRiskReport.ai_risk_summary and the Koidex compliance block have no
      equivalent among the 13 commands and are gone from the summary.
    - Sub-playbooks repointed to KOI Ext - Extract Alert Context, KOI Ext - Investigate Item,
      KOI Ext - Investigate Device and KOI Ext - Block and Remediate.

  ============================================================================
  ORDERING AND CONTEXT HAZARDS (do not reorder tasks casually)
  ============================================================================
    1. koi-inventory-list APPENDS to Koi.Inventory, and KOI Ext - Investigate Device lists up
       to 500 items for a whole host into the same path. The org risk level and marketplace are
       therefore captured into KoiTriage.* scalars BEFORE the device investigation runs. Move
       the device task earlier and the verdict will start reading a device-wide array.
    2. LastArrayElement, not FirstArrayElement, is used when reading Koi.Inventory — because the
       path is appended to, the last element is this playbook's own lookup.
    3. The blocklist read is inside the item branch, so KoiTriage.blocklisted_item is only ever
       evaluated when an item_id exists.
    4. marketplace: the alert observable carries "chrome" on 3 of 314 rows while the API's
       vocabulary is "chrome_web_store", and MCP alerts carry no marketplace at all. The
       inventory lookup's own Koi.Inventory.marketplace is preferred over the alert's value
       when available, and KOI Ext - Block and Remediate re-resolves it by item_id if it is
       still empty.
