inputs:
- key: instance_name
  value: {}
  required: false
  description: The KOI integration instance to use for every KOI command in this playbook and its sub-playbooks. Leave empty to let the platform pick the single enabled instance of the Marketplace KOI pack.
  playbookInputQuery: null
- key: device_risk_levels
  value:
    simple: high,critical
  required: false
  description: Comma-separated risk levels the device investigation flags as risky. Vocabulary - low, medium, high, critical, pending. All five occur on live data.
  playbookInputQuery: null
- key: dedupe_alert_field
  value: {}
  required: false
  description: 'Machine name of the ALERT FIELD that carries the KOI notification id (metadata.notification_event_id / the koi_notification_id column promoted by this pack''s parsing rule). Set this and the playbook suppresses duplicate KOI deliveries: the second and later alerts for the same notification are closed as duplicates instead of being investigated again. LEAVE IT EMPTY AND SUPPRESSION IS OFF - the playbook then triages every delivery, which on live data is up to 245 investigations of one real alert. There is no default because the field''s machine name is created by your correlation rule''s field mapping, not by this pack; see the DUPLICATE ALERTS section of the playbook description for how to create it. Example value - koinotificationid.'
  playbookInputQuery: null
- key: dedupe_lookback
  value:
    simple: 3 days
  required: false
  description: How far back to look for an earlier alert carrying the same KOI notification id. Must be at least as long as KOI keeps re-sending one alert; the longest re-send run observed on live data is 6.8 hours (408 deliveries, one per minute). Only used when dedupe_alert_field is set.
  playbookInputQuery: null
outputs:
- contextPath: KoiTriage.verdict
  description: The triage verdict (Benign / Suspicious / Malicious).
  type: string
- contextPath: KoiTriage.summary
  description: The markdown triage summary.
  type: string
- contextPath: KoiTriage.org_risk_level
  description: The organization's inventory risk level for the alerted item (signal C). Empty is inconclusive (no record yet / index lag), not an absence.
  type: string
- contextPath: KoiTriage.org_risk_score
  description: The organization's numeric inventory risk score for the alerted item, captured alongside signal C.
  type: number
- contextPath: KoiTriage.marketplace
  description: The resolved marketplace for the alerted item, in the KOI API vocabulary. Prefers the inventory record (a command output, already canonical) over the alert payload (mapped from the event vocabulary by KOI Ext - Extract Alert Context). Safe to pass to any KOI command; may legitimately be empty.
  type: string
- contextPath: KoiTriage.blocklisted_item
  description: The alerted item_id when it is already on the org blocklist, otherwise empty (signal D).
  type: string
- contextPath: KoiTriage.dedupe_state
  description: 'Outcome of the duplicate-suppression gate: "first delivery of this KOI notification id", or "not evaluated ..." when the gate could not run. When the alert is a re-delivery the playbook closes it and never reaches this output.'
  type: string
- contextPath: KoiTriage.duplicate_of
  description: Comma-separated ids of earlier alerts already created for the same KOI notification id. Non-empty means this alert is a re-delivery and was closed without investigation.
  type: string
- contextPath: KoiTriage.self_alert_id
  description: This alert's own id, used to exclude it from the duplicate search. Empty means ${alert.id} did not resolve and duplicate suppression was skipped.
  type: string
tags:
- koi
- koi-ext
quiet: false
