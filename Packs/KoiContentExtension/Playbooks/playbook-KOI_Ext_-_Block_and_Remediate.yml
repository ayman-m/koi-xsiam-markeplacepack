id: KOI Ext - Block and Remediate
version: -1
fromversion: 6.10.0
name: KOI Ext - Block and Remediate
description: |-
  Response playbook for a flagged KOI item, for the Marketplace KOI pack (Koi, v1.2.3 —
  13 commands, integration only). Resolves the item's marketplace, runs the full
  investigation (KOI Ext - Investigate Item), short-circuits if the item is already on the
  blocklist, presents an analyst approval gate, and — only on approval — adds the item to
  the organization-wide KOI blocklist with koi-blocklist-items-add.

  SAFE BY DEFAULT. The blocklist write never fires without explicit analyst approval unless
  the caller passes auto_block=true. KOI Ext - Alert Triage always passes auto_block=false.
  This gate is a governance control, not a convenience — do not remove it.

  Both commands this playbook depends on (koi-blocklist-get, via the investigation, and
  koi-blocklist-items-add) exist in the Marketplace pack, so the response path ports intact.
  Rewiring vs the custom pack: the sub-playbook KOI - Investigate Item becomes
  KOI Ext - Investigate Item. The approval gate loses four decision lines that have no
  substitute in this pack: catalog (Koidex) risk level and score, the AI risk summary,
  remediation history and prior approval history. Allowlist state was added in their place.

  koi-blocklist-items-add DECLARES NO OUTPUTS AT ALL in this pack (verified in
  reference/marketplace-pack.json: "outputs": []). Nothing lands in context, so the playbook
  CANNOT branch on the API's answer — it can only branch on whether the command task errored.
  KoiBlock.status = "Blocked" therefore means "the add call returned without an error", not
  "the API confirmed a new blocklist entry". Re-run koi-blocklist-get if you need proof.

  MARKETPLACE IS LOAD-BEARING. koi-blocklist-items-add takes item_id + marketplace as a pair
  ("required when not using items_list_raw_json_entry_id"), and the alert payload does not
  always carry one — on live data item.marketplace is present on 296 of 314 alerts and is
  absent on every MCP-server alert. When marketplace is not supplied, this playbook resolves
  it from koi-inventory-list(item_id=<id>, limit=1) -> Koi.Inventory.marketplace. If it is
  still unknown at the write step the block is SKIPPED rather than attempted, so a malformed
  call is never made. Known trap: the alert observable can carry marketplace "chrome", while
  the API's accepted vocabulary is "chrome_web_store" — prefer the value the inventory lookup
  returns over the value the alert carried.
