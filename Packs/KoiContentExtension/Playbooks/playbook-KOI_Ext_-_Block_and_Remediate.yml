inputs:
- key: item_id
  value: {}
  required: true
  description: The KOI item ID to block. In an alert this is observables[name="item.id"].value.
  playbookInputQuery: null
- key: marketplace
  value: {}
  required: false
  description: The item's marketplace. Optional - when empty it is resolved from koi-inventory-list(item_id). Accepted values are the API vocabulary (npm, chrome_web_store, vscode, pypi, homebrew, ...); note the alert payload may carry "chrome", which the API does not accept.
  playbookInputQuery: null
- key: version
  value: {}
  required: false
  description: The item version. Passed to the investigation so it can list the endpoints carrying this exact version; not used by the blocklist write itself.
  playbookInputQuery: null
- key: reason
  value: {}
  required: false
  description: Reason / notes recorded on the blocklist entry and shown in the approval gate.
  playbookInputQuery: null
- key: created_by
  value:
    simple: xsoar-koi-response
  required: false
  description: Attribution recorded on the blocklist entry. The API documents this field as an email address.
  playbookInputQuery: null
- key: auto_block
  value:
    simple: 'false'
  required: false
  description: Set to true to skip the analyst approval gate and block automatically. Default false (approval required). KOI Ext - Alert Triage always passes false.
  playbookInputQuery: null
- key: instance_name
  value: {}
  required: false
  description: The KOI integration instance to use. Leave empty to let the platform pick the single enabled instance of the Marketplace KOI pack.
  playbookInputQuery: null
outputs:
- contextPath: KoiBlock.status
  description: The block outcome - Blocked / Rejected / Failed / Already blocked / Skipped - marketplace unknown.
  type: string
- contextPath: KoiBlock.marketplace
  description: The marketplace actually used for the blocklist write.
  type: string
tags:
- koi
- koi-ext
quiet: false
