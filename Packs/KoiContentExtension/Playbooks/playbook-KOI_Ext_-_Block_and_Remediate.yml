  playbookInputQuery: null
- key: marketplace
  value: {}
  required: false
  description: 'The item''s marketplace. Optional - when empty it is resolved from koi-inventory-list(item_id). EITHER vocabulary is accepted: a raw event value (software_windows, chrome, vsc, ...) is mapped onto the API vocabulary (windows, chrome_web_store, vscode, ...) by tasks 18-21, and a value already in API form passes through unchanged. A value with no API equivalent (ollama, built_in, side_loaded) is treated as unknown and resolved from the org inventory instead.'
  playbookInputQuery: null
- key: version
  value: {}
  required: false
  description: The item version. Passed to the investigation so it can list the endpoints carrying this exact version; not used by the blocklist write itself.
  playbookInputQuery: null
