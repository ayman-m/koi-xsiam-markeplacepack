inputs:
- key: match
  value: {}
  required: true
  description: The raw hunt match row (one element of a hunt's XQL results), passed whole. Its fields are read here by coalesce so the four hunts' differing column names are all handled in one place.
  playbookInputQuery: null
- key: hunt_id
  value: {}
  required: true
  description: The hunt that produced this match (e.g. H2.1).
  playbookInputQuery: null
- key: match_kind
  value:
    simple: item
  required: true
  description: item (H2.1/H2.6/H1.3) or host (H4.2). Selects the investigation path.
  playbookInputQuery: null
- key: known_bad
  value:
    simple: 'false'
  required: false
  description: true for compromise-grade hunts (H2.1, H2.6). Only known_bad matches are eligible for the parent's analyst-gated response route.
  playbookInputQuery: null
- key: reason
  value: {}
  required: false
  description: Human-readable reason the hunt fired, recorded on the match row.
  playbookInputQuery: null
- key: version
  value: {}
  required: false
  description: Optional item version to investigate; when empty the org inventory version is used.
  playbookInputQuery: null
- key: instance_name
  value: {}
  required: false
  description: The KOI integration instance to use. Leave empty for the single configured instance.
  playbookInputQuery: null
- key: xql_time_frame
  value:
    simple: 7 days
  required: false
  description: Time frame for the optional XDR runtime-evidence XQL inside KOI Ext - Investigate Item.
  playbookInputQuery: null
outputs:
- contextPath: KoiHunt.Matches
  description: 'One normalized hunt-match verdict object: hunt_id, match_kind, known_bad, item_id, item_name, marketplace (API form), hostname, risk, reason, org_risk_level, exposure, governed and recommendation. Accumulated into an array by the parent across all matches.'
  type: unknown
- contextPath: KoiHunt.Matches.hunt_id
  description: The hunt that produced the match.
  type: string
- contextPath: KoiHunt.Matches.item_id
  description: Normalized KOI item id (empty for a host/shadow match).
  type: string
- contextPath: KoiHunt.Matches.marketplace
  description: Marketplace in the API vocabulary (empty when unknown).
  type: string
- contextPath: KoiHunt.Matches.governed
  description: blocklisted / allowlisted / ungoverned / n/a (host).
  type: string
- contextPath: KoiHunt.Matches.recommendation
  description: Recommended next action for the match.
  type: string
tags:
- koi
- koi-ext
quiet: false
