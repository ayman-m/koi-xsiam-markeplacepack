id: KOI Ext - Hunt Match Investigation
version: -1
fromversion: 6.10.0
name: KOI Ext - Hunt Match Investigation
description: |-
  Sub-playbook of KOI Ext - Hunt Sweep, for the KOI Content Extension pack (extends the Marketplace KOI pack v1.2.3, integration id "KOI", 13 commands).

  Takes ONE hunt match (the raw XQL row, passed whole as the `match` input, plus hunt_id, match_kind and known_bad) and returns one normalized KoiHunt.Matches verdict object. The whole row is passed and its fields are read here by coalesce, so the four hunts' differing column names (item_id / item_key / object_id; alert_host / agent_hostname / host_list; item_risk) are all handled in one place with no forEach column desync.

  For an ITEM match it runs KOI Ext - Investigate Item (org risk, endpoint/blast radius, and blocklist/allowlist governance via koi-inventory-list / koi-inventory-item-endpoints-list / koi-blocklist-get / koi-allowlist-get). For a HOST/shadow match (H4.2) it gathers host context with the Cortex-native core-get-endpoints and RECOMMENDS - never auto-runs - a core-script-run of the KOI deployment script to refresh a stale host.

  MARKETPLACE VOCABULARY: the raw event `marketplace` is a SHORT form (software_windows, chrome, vsc). It is mapped to the API long form (windows, chrome_web_store, vscode) with the same table the parsing rule and KOI Ext - Investigate Item use, before it is handed to any koi- command. built_in / side_loaded / ollama have no API value and map to empty (unknown -> resolved from inventory). Every command task is continueonerror so one failed enrichment never aborts the sweep.
