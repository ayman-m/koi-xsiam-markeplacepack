id: KOI Ext - Investigate Device
version: -1
fromversion: 6.10.0
name: KOI Ext - Investigate Device
description: |-
  Device posture check for the Marketplace KOI pack (Koi, v1.2.3 — 13 commands, integration only).
  Given a device_id, lists everything KOI sees installed on that device, flags the items whose
  risk_level is in risk_levels (default high,critical), and posts a posture summary plus a
  risky-items table. Reusable from KOI Ext - Alert Triage or standalone. Best-effort: every
  command task is continue-on-error.

  THERE IS NO DEVICE OBJECT IN THIS PACK. The Marketplace pack ships no koi-devices-list,
  no koi-device-inventory-get and no Koi.Device.* context prefix — the data model is
  item-centric. A device is addressable only as a FILTER on inventory:
  koi-inventory-list(device_id=<id>), which is a verified argument of that command
  ("Filter devices by device ID"). Everything this playbook knows about the host therefore
  comes back as Koi.Inventory.* item records, not as device attributes. The hostname cannot
  be resolved from a device_id; it is passed in as an input and comes from the alert payload
  (resources[type=device].data.hostname), or is left blank when running standalone.

  Substitution vs the custom pack (KOI v1.3.0, 26 commands) this was ported from:
    - koi-device-inventory-get(device_id, limit)  ->  koi-inventory-list(device_id, limit)
      Koi.DeviceInventory.*  ->  Koi.Inventory.*
      The records returned are ORG-LEVEL item records, so version, first_seen, last_seen,
      endpoint_count and installs_count are organization-wide aggregates, NOT this device's.
      Per-device activation_status, local install path, per-host version and per-host
      first_seen are not available in this pack.
    - koi-remediations-list  ->  DROPPED. No command in the 13 returns remediation records,
      so "remediations on this host" is gone; the row was removed from the summary rather
      than left showing zero.

  CONTEXT HYGIENE: koi-inventory-list, koi-inventory-item-get and koi-inventory-search all
  write the same Koi.Inventory.* paths and repeated calls APPEND. This playbook therefore
  deletes Koi.Inventory before listing, so total_items and the risky-items table describe
  the device only and are not inflated by an earlier item-scoped lookup made by the caller.
  Callers that need an item-scoped Koi.Inventory value must capture it as a scalar BEFORE
  invoking this playbook.
