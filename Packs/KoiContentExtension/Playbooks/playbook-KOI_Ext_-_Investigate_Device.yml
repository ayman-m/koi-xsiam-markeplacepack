inputs:
- key: device_id
  value: {}
  required: true
  description: The KOI device ID. Used as the device_id filter on koi-inventory-list. In an alert this is resources[type=device].data.id.
  playbookInputQuery: null
- key: hostname
  value: {}
  required: false
  description: The device hostname, for display only. It CANNOT be resolved from device_id in this pack — there is no device command. Supply it from the alert payload (resources[type=device].data.hostname).
  playbookInputQuery: null
- key: risk_levels
  value:
    simple: high,critical
  required: false
  description: Comma-separated Koi.Inventory.risk_level values to flag. Vocabulary - low, medium, high, critical, pending.
  playbookInputQuery: null
- key: instance_name
  value: {}
  required: false
  description: The KOI integration instance to use. Leave empty to let the platform pick the single enabled instance of the Marketplace KOI pack.
  playbookInputQuery: null
outputs:
- contextPath: KoiDeviceInv.total_items
  description: Number of inventory items KOI sees on the device.
  type: number
- contextPath: KoiDeviceInv.risky_count
  description: Number of those items at a risk level listed in risk_levels.
  type: number
- contextPath: KoiDeviceInv.summary
  description: Markdown device posture summary.
  type: string
- contextPath: Koi.Inventory
  description: The inventory items on the device (org-level item records, filtered by device_id).
  type: unknown
tags:
- koi
- koi-ext
quiet: false
