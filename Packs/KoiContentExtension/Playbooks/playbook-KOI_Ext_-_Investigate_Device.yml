      description: 'THEME D / D3c — is silence from KOI on this host evidence of no change, or of no scan? Runs xdr-xql-generic-query (Cortex XDR - XQL Query Engine, NOT a KOI command) over xdr_data PROCESS for processes whose image path contains "Koi" (the KOI agent bundles its own interpreter under ...\Local\Koi\Python), keyed on agent_hostname = ${inputs.hostname}. Uses only xdr_data, so the Alerts dedupe rule does not apply. continue-on-error.'
