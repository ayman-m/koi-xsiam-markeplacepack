- contextPath: KoiDeviceInv.total_items
  description: Number of inventory items KOI sees on the device.
  type: number
- contextPath: KoiDeviceInv.risky_count
  description: Number of those items at a risk level listed in risk_levels.
  type: number
- contextPath: KoiDeviceInv.summary
  description: Markdown device posture summary.
  type: string
- contextPath: Koi.Inventory
  description: The inventory items on the device (org-level item records, filtered by device_id).
  type: unknown
- contextPath: KoiDeviceInv.xdr_enrichment_state
  description: 'Optional XDR enrichment: set when the XDR correlation lane was skipped because no hostname was supplied.'
  type: string
- contextPath: PaloAltoNetworksXQL.GenericQuery
  description: 'Optional XDR enrichment: raw result of the last xdr-xql-generic-query in the correlation lane (D3c scan freshness / D4 acquisition timeline). Present only when the Cortex XDR - XQL Query Engine integration is installed.'
  type: unknown
