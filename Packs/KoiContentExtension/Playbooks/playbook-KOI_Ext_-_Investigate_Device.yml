    type: regular
    task:
      id: koiexdev-0000-4000-8000-000000000015
      version: -1
      name: Host acquisition timeline (XQL)
      description: 'THEME D / D4 — on this host, in this window, what arrived and which process brought it? Runs xdr-xql-generic-query (Cortex XDR - XQL Query Engine, NOT a KOI command) unioning koi_koi_raw Audit (what KOI says arrived) with xdr_data PROCESS (which installer/package-manager was running), both keyed on ${inputs.hostname}. The koi_koi_raw side reads source_log_type = "Audit" (NOT Alerts), so the Alerts dedupe rule does not apply. continue-on-error.'
      iscommand: true
      brand: ''
      script: '|||xdr-xql-generic-query'
      type: regular
    scriptarguments:
      query:
        simple: |-
          dataset = koi_koi_raw
          | filter source_log_type = "Audit" and type = "extensions"
          | filter hostname = "${inputs.hostname}"
          | filter action in ("installed", "updated")
          | alter lane = "1_KOI_SAYS_ARRIVED"
          | alter what = concat(object_name, " @", coalesce(item_version, "?"))
          | alter how  = concat(coalesce(marketplace, "<unset>"), " / ", coalesce(platform, "?"))
          | alter who  = coalesce(triggered_by, "-")
          | fields _time, lane, what, how, who
          | union
          (dataset = xdr_data
           | filter event_type = ENUM.PROCESS
           | filter agent_hostname = "${inputs.hostname}"
           | filter action_process_image_name in ("pip.exe", "pip3.exe", "npm.exe", "npx.exe", "node.exe", "git.exe", "curl.exe", "wget.exe", "winget.exe", "msiexec.exe", "choco.exe", "code.exe", "cursor.exe")
           | filter action_process_image_command_line not contains "--type="
           | alter lane = "2_XDR_BROUGHT_IT"
           | alter what = coalesce(action_process_image_command_line, action_process_image_name)
           | alter how  = concat(coalesce(actor_process_image_name, "?"), " -> ", coalesce(action_process_image_name, "?"))
           | alter who  = coalesce(action_process_username, "-")
           | fields _time, lane, what, how, who)
          | sort asc _time
          | limit 400
      time_frame:
        simple: ${inputs.xql_time_frame}
      query_name:
        simple: KOI Ext - Host acquisition timeline
